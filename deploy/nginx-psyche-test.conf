# /etc/nginx/sites-available/psyche-test
# 對外 HTTPS 由 Cloudflare 邊緣處理，本機只需聽 80。

server {
    listen 80;
    listen [::]:80;
    server_name psyche-test.com www.psyche-test.com;

    # 前端靜態檔（vite build 產物）
    root /home/keye/webapp/frontend/dist;
    index index.html;

    # 上傳/回應大小（PDF、deep-analysis 等）
    client_max_body_size 10m;

    # React SPA：找不到實體檔就回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 轉給 uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE 串流（chatbot/stream、deep-analysis/stream）需要關閉緩衝
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # 靜態資源長快取（檔名帶 hash）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
